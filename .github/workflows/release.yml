name: Release

on:
  workflow_dispatch:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    if: "github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, 'chore: release v')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: "pnpm"

      - name: Validate release PR
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: node scripts/validate-release-pr.ts

  publish:
    if: "github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'chore: release v'))"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: release-publish
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          SKIP_ENV_VALIDATION: "true"
        run: pnpm build

      - name: Publish to npm
        id: publish
        run: node scripts/publish.ts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.publish.outputs.release_tag }}"
          if [ -z "$TAG" ]; then
            echo "✖ release_tag output not set — aborting release creation"
            exit 1
          fi
          NOTES="changelog/${TAG}.md"
          if [ ! -f "$NOTES" ]; then
            echo "✖ changelog file $NOTES not found"
            exit 1
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping creation"
          else
            gh release create "$TAG" --title "$TAG" --notes-file "$NOTES"
          fi

      - name: Deploy DocSync server to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ vars.RAILWAY_DOCSYNC_SERVICE || 'docukit-docsync' }}
        run: pnpm dlx @railway/cli up --service "$RAILWAY_SERVICE" --environment production --ci

      - name: Deploy docs to Vercel
        env:
          VERCEL_ORG_ID: team_fCh184rIrqEO1RmklNmEH6dR
          VERCEL_PROJECT_ID: prj_6hZQc795Nzc7Vuh7CTpS4yJhbblR
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@51 pull --yes --environment=production
          npx vercel@51 build --prod
          npx vercel@51 deploy --prebuilt --prod
