name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm install -g pnpm && pnpm install
      - name: Build docs and workspace dependencies
        env:
          NEXT_PUBLIC_DOCSYNC_SERVER_URL: ws://localhost:8081
          SKIP_ENV_VALIDATION: "true"
        run: pnpm exec turbo build --filter=@docukit/docs
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-browsers-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps
      - name: Run Playwright tests
        env:
          NEXT_PUBLIC_DOCSYNC_SERVER_URL: ws://localhost:8081
          SKIP_ENV_VALIDATION: "true"
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: .test-results/playwright/
          retention-days: 7
